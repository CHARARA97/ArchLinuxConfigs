include themes/matugen.conf

window_padding_width 0
window_margin_width 0

hide_window_decorations

background_opacity 1

font_size 17

remember_window_size no
confirm_os_window_close 0
shell zsh

cursor #FF0088
cursor_trail 3
cursor_shape block
cursor_trail_color #FF0088
cursor_trail_decay 0.1 0.6
cursor_trail_hold 3
cursor_trail_start_threshold 0

# BEGIN_KITTY_THEME
# Tokyo Night Moon
include current-theme.conf
# END_KITTY_THEME


# BEGIN_KITTY_FONTS
font_family      family="Maple Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
